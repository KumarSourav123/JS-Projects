<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <div id="game-container">
        <h2 id="game-title" >Number Guessing Game</h2>
        <p id="game-description">Try and guess a random number between 1 and 100.<br>you have 10 attempts to guess the right number.        
        <h1>Guess a Number</h1>
        <div id="guess-form">
            <input id ="guess-input" type="text">
            <button id="submit-btn">submit guess</button>
            <div id="message"></div>   
        </div>
        <div>
            <h4 class="stats-label">Previous Guesses:<span id="previous-guesses"></span></h4>
            <h4 class="stats-label">Guesses Remaining:<span id="remaining-attempts"></span></h4>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
