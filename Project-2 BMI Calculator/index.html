<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <div class="parent">
        <h2 class="heading">BMI calculator</h2>
        <div>
            Height in CM:
            <input id="height" type="text">            
        </div>
        <div>
            Weight in KG:
            <input id="weight" type="text">
        </div>
        <div id="final">
            <button id="result">Calculate</button>
            <div id="show"></div>
        </div>
        <div>
            <h2 class="heading">BMI Weight Guide</h2>
            <p>UnderWeight = less than 18.5</p>
            <p>Nrmal = from 18.5 to 24.9</p>
            <p>OverWeight = from 25 to 29.9</p>
            <p>Obesity = greater than 30</p>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
